<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hex Commander Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="warning-overlay"></div>
    <div id="coords-hud">Q: 0 R: 0 S: 0</div>

    <div id="ui-top">
        <input type="text" id="player-name" placeholder="Enter Player Names (comma separated)">
        
        <div class="controls-row">
            <select id="colorSelect">
                <optgroup label="Neon Styles">
                    <option value="cyan" selected>Neon Cyan</option>
                    <option value="lime">Neon Lime</option>
                    <option value="magenta">Neon Magenta</option>
                    <option value="yellow">Neon Yellow</option>
                </optgroup>
                <optgroup label="Flat Styles">
                    <option value="orange">Flat Orange</option>
                    <option value="red">Flat Red</option>
                    <option value="blue">Flat Blue</option>
                    <option value="gray">Flat Gray</option>
                </optgroup>
            </select>

            <div class="toggle-box">
                <input type="checkbox" id="random-toggle">
                <span>RANDOM</span>
            </div>
        </div>
    </div>

    <div class="fab-container">
        <div id="center-map" class="icon-btn">🎯</div>
        <div id="cb-toggle" class="icon-btn">👁️</div>
    </div>

    <canvas id="mapCanvas"></canvas>

    <div id="sidebar">
        <div class="control-group">
            <label>SPACING: <span id="spacing-val">1</span></label>
            <input type="range" id="spacing-ctrl" min="0" max="10" value="1">
        </div>

        <div class="io-group">
            <textarea id="io-area" spellcheck="false"></textarea>
            <button class="btn" id="btn-copy">COPY JSON</button>
            <button class="btn" id="btn-import">IMPORT</button>
            <button class="btn btn-danger" id="btn-clear">CLEAR MAP</button>
        </div>
    </div>

    <div id="context-menu">
        <button id="menu-move">MOVE HQ</button>
        <button id="menu-delete" class="text-danger">DELETE</button>
    </div>

    <script src="mapEngine.js"></script>
    <script src="app.js"></script>
</body>
</html>
