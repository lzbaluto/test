<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexMap Pro | Complete Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="warning-overlay">PLACEMENT RESTRICTED</div>
    <div id="coords-hud">Q: 0 R: 0 S: 0</div>

    <div class="fab-container">
        <div id="cb-toggle" class="icon-btn" title="Toggle Colorblind Mode">👁️</div>
        <div id="center-map" class="icon-btn" title="Center Map">⌖</div>
    </div>

    <header id="ui-top">
        <input type="text" id="player-name" placeholder="Names (Comma Separated)">
        <div class="controls-row">
            <div id="palette-container"></div>
            <label class="toggle-box">
                <input type="checkbox" id="random-toggle">
                <span>Random</span>
            </label>
        </div>
    </header>

    <aside id="sidebar">
        <section class="control-group">
            <label>HQ GAP: <span id="spacing-val">1</span></label>
            <input type="range" id="spacing-ctrl" min="0" max="3" value="1" step="1">
        </section>
        
        <section class="io-group">
            <textarea id="io-area" spellcheck="false"></textarea>
            <button class="btn" id="btn-copy">Copy JSON</button>
            <button class="btn" id="btn-import">Import JSON</button>
            <button class="btn btn-danger" id="btn-clear">Wipe Map</button>
        </section>
    </aside>

    <div id="context-menu">
        <button id="menu-move">Move HQ</button>
        <button id="menu-delete" class="text-danger">Delete</button>
    </div>

    <canvas id="mapCanvas"></canvas>

    <script src="mapEngine.js"></script>
    <script src="app.js"></script>
</body>
</html>
