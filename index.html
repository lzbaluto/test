<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Commander</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mobile-specific overrides for the new dropdown and touch stability */
        body {
            touch-action: none; /* Prevents the whole page from bouncing/scrolling on mobile */
            overflow: hidden;
        }

        .ui-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            width: 90%;
            max-width: 350px;
        }

        select#colorSelect {
            padding: 12px;
            font-size: 16px; /* Prevents iOS zoom-on-focus */
            border-radius: 8px;
            background: #222;
            color: white;
            border: 1px solid #444;
            width: 100%;
        }

        #moveHQ {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div id="game-canvas">
        <div id="hq-unit">HQ</div>
    </div>

    <div class="ui-container">
        <select id="colorSelect">
            <optgroup label="Neon Styles">
                <option value="#39ff14" selected>Neon Green</option>
                <option value="#ff00ff">Neon Pink</option>
                <option value="#00ffff">Neon Cyan</option>
            </optgroup>
            <optgroup label="Flat Styles">
                <option value="#2ecc71">Flat Green</option>
                <option value="#e74c3c">Flat Red</option>
                <option value="#3498db">Flat Blue</option>
                <option value="#7f8c8d">Flat Gray</option>
            </optgroup>
        </select>

        <button id="moveHQ">MOVE HQ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
